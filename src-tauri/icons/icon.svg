<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a25"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00a8cc"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  
  <!-- Glow effect -->
  <circle cx="256" cy="256" r="180" fill="url(#glow)" opacity="0.1"/>
  <circle cx="256" cy="256" r="140" fill="url(#glow)" opacity="0.15"/>
  
  <!-- Bluetooth symbol -->
  <path d="M256 80 L336 160 L256 240 L336 320 L256 400 L256 240 L176 320 L256 240 L176 160 L256 240 Z" 
        fill="none" 
        stroke="url(#glow)" 
        stroke-width="24" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Center accent -->
  <circle cx="256" cy="240" r="16" fill="url(#glow)"/>
</svg>
